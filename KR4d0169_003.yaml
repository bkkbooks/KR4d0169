body:
  text: 默成文集卷三宋潘良貴撰矯齊君子知强為善而已矣遑恤其他而世之忌人修也無以蓋之則羣聚譁笑目之曰矯特立獨行之士固不為變而中人忌其加巳也往往嫵媚軟熟不敢出一善言行一善行卒至於無所忌憚為小人之歸而後已豫自出仕見士大夫習以成風敗壞天下人材不可勝數心甚悼之中庸曰君子和而不流强哉矯中立而不倚強哉矯凡四言之不以為煩考之六經未嘗若是之諄諄者也是矯者君子之所務而衆人之所忽古人以為訓而今人以為病也近世老師宿儒為中庸傳者十數家未嘗有斷然發明子思此意者尤可嘆也夫鈞是人也性近而習逺所以相逺正在矯與不矯耳情動於中物誘於外擇之不精執之不固未有不喪已於物者詎可日不用力於矯耶視聽矯之言動矯之一切日用惟禮之行義之由道之適久則若性自然矣故勉强行之與安而行之成功則一豫謂中庸一言之則曰矯二言之則曰勉强皆聖人忠恕進學者之道也吾宗伯益端雅而尚志求豫名所居之齊因榜之曰矯蓋豫韋弦子思之訓始終不衰也今老矣俯仰樂而無愧故以勉子子其懋哉靜勝齊凡人自平旦而起目視耳聽手持足奔其心念之所經營雜然無一息暫止及夜而安身可以休矣又有夢焉飛揚沉墜得失悲歡與夫恐怖之事往往失聲而泚汗如是汨沒至老死而不悟者天下皆是也故常為靜者之所憐憫曹君用晦異時與豫同鄉校遊上庠今餘二十年矣屬過豫言曰向誠有意於功名官既不偶乃得更儒冠為武此世事之不可必而甚可笑者也頻年不喜事事寄傲僧廬闢齊於西廡以自適幸為名之夫吾子一人之身也方其髙車秣馬馳逐乎通都大邑何所見而其心如彼今而紙窗竺屋環堵蕭然終日凝默何所見而其心如此是必有靜於中而勝於外者矣然豫觀醉者顛倒錯亂既醒而病病而悔且言曰終吾之身誓弗入於口忽一旦樽俎設於前歌舞在其側又欣欣起而從之不獨忘其身之戒反嗤醒者以為妄人子懲於前既已靜矣其進益此道視醉者以為鑒哉寶林禪寺記義烏縣南雲黃山下梁普通元年傅大士依雙檮木結庵大同六年即其地建寺因名雙林佛殿宋治平三年賜今額宣和三年燬于寇紹興四年建藏殿住山僧標次第復完凡為屋一千二百餘間有大比丘其名行標號曰慧炬一日過豫從容言曰維雲黃山是為蕭梁善慧大士修證道場我以緣法總徒一年兵火之餘豈弟慈祥外護我法考其性資有大士宗我將懇祈丐其名御起勝妙因為邦人倡郡將聞已愀然改容顧謂標曰方時孔囏民力困耗吾護此方如護元氣不以毫髮呼擾井閭况此土木不急之工勞人費財為役甚巨縱使彌勒即今示見我猶持此力勸止之標聞是逡巡而旋復見豫言事不諧矣豫曰太守之職承流宣化奉法愛民而外有為實非其責不若自營我法博募廣求况師駐錫以來道俗傾鄉時節或至咄嗟可成標還雲黃山大開法席遍召檀那而告之曰惟我大士誕育此方為瑞為祥人人共仰雙檮建寺甲於叢林自梁迄今餘六百載流通祖道代不乏人宣和三年盜起闕定不幸煨燼一椽不存今歷嵗時堂廡齊㕑粗成行列獨茲殿址瓦礫弗治妙相慈容久無所宅爾等善友忍坐視耶客聞標語歡喜踊躍於是退而各盡已力大出金錢合而計之餘五十萬以紹興二年春經始三年冬告成其髙八十餘尺而廣倍其半中安像設莊嚴妙好外繚闌楯雄麗靚深入化人宫迥出空際里之士女與旁州之人奔走往來作禮數皆曰耳目未嘗見聞山林增輝緇衲雲集坐變榛莽為金碧區未有成辦大緣如是之速者也故嘗論之一切世有為之法皆有分齊長短可度輕重可權淺深可側小大可稽至于佛法則大不然淵乎妙哉視之不見聽之不聞智不能知識不能識古經云以思惟心測度如來圓覺境界如取螢火燒須彌山終不能著觀夫世之治生殖業銖積寸纍可謂勤矣假使骨肉就其乞貸愛惜靳吝未嘗輕捐至佛㑹中心生悲喜則傾囊倒廩略無留難又其最者身體髮膚頭目髓腦於彈指頃棄舍如遺其故何哉蓋淨智妙圎與吾如來本同一體念起背覺遂爾合塵塵昏本明轉不息佛以慈悲哀憐覆護於生死海誓作津梁猶如父母惜所愛子子出逺遊望望不至彼為子者漂流途路雖未即歸寢食之間嘗懷憶念聞說父母涕淚自垂感召之因疾若桴鼓此豈可以情量揣摩筆舌形其萬一哉標之為是役也豫最詳其本末故樂為之記且懼來者之隳其績也復為說偈曰良木秀山澤中林猶百年斫削應約繩必資諸巧匠陶者輸瓦甓圬人施塗泥絲網及寶鈴丹漆塈塑績罷精磨嵗月始克觀厥成金錢與糗糧所費如山積雖名有漏法實為無量德庶俾凡覩聞因緣得入道我昔禮大士廣厦餘千間何人持烈烟一燎不存芥嗚呼有施者又有戕毁人良繇弗思維縱我無明故今合檀施力作新美踰初丁此時囏危為衆作依怙咨爾方來者毋意隳前功增飭愛護之當如扞頭目使百千萬億遊戲依雙林於寵華㑹中永瞻微妙相紹興六年二月日左朝奉郎直龍圖閣管亳州明道宫潘良貴撰君子有三戒說孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬬及其老也血氣既衰戒之在得豫謂此言如大醫王之治病其針砭足以起死人而肉白骨但方其病時不遇此雖遇之而不受者滔滔皆是也豫少出見紛華而悅及壯好勝多忿色鬭二病纒痼餘二十年莫覺莫知朋友莫豫告也今老矣二病不藥而去獨志得之心早夜熾然非問舍求田則慮子孫而憂妻妾曰如是則可以安吾身也如是則可以適吾意也嵗得貨財若干則可以足吾用度得榖粟若干則可以飽吾宗族官當擇優厚之地俸當為蓄積之資橫心所念莫非惟得之從嗚呼誠可哀也已夫夜之所夢多晝之所為也臨事而不懼皆平日之所習也今志得之心不戒如此脫遇有可得者能辨禮義而受之乎其貪冒無恥為小人之歸必矣乃知得之一字痛針老者之膏肓非聖人不能言也豫既犯其二戒幸而未死尚可奉其一以周旋自今以始當以德之不修學之不講聞義不能徙不善不能改為憂其餘流行坎止一切付與自然得正而斃焉斯已矣失之東隅收之桑榆尚庶幾其無愧焉潘好古字說豫始官京師聞吾宗有士名好古字敏修爽邁不羣與豫弟遊太學同硯席雅相愛好而獨未之識也其後豫以豫宫祠居鄉敏修始來訪豫坐與語氣直而志剛奮然有志於為巳之學心益器之建炎已酉金大入明越豫避地武川復與敏修相依於劉巖之上暇日從容正襟而問曰子名而又字之豈夫子所謂我非生而知之者好古敏以求之者乎曰然豫曰凡學者皆有師不可不嚴而欽況夫子自生民以來未之有天下之所尊事乎彼其言曰我非生而知好古敏以求之自謙之詞也雖自卑之辭然所以為夫子亦不過如此而已今子名且字之必以我為好大而不降讓也請以字易之夫古不可以不好聖而不好古不得謂之聖賢而不好古不得謂之賢學者以聖賢為師卒期至於聖賢而後已然聖賢得於古必有以行於今所謂行於今非茍有所合也今有戾於古以古正之正之而從也則推之天下與民共由不卑今而尊古正之而不從也則斂之一身獨行其道不枉古而從今要非好之篤鮮有不移於今者老子曰執古之道以御今之宜御猶御馬也緩急馳騁惟御之適而不惟馬之御誠能御今可以言好古矣請易子之字曰伯御甫子學誠施於今吾將觀子矣肅齊說姪甸求名其讀書齊且言曰小子不敏請事斯名豫觀晚進為口耳之學僅能誦紙上書衒露輕儇忽同列而侮老成求日益而為君子難矣所謂君子者無往而不致其肅也外之言貌視聽內之心思常恭莊端恪不少懈焉子試習之積時以終日積日以終月積月以終嵗造次顛沛不忘所謂肅者行之三年然後見豫而問焉豫又將以語子子不易豫言則自茲始今以名齊其出入觀之默成文集卷三
