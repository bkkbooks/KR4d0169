  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0169_WYG_004-1a, image: WYG1133/WYG1133-0387c.png}
body:
  text: 默成文集卷四宋潘良貴撰鄭亨仲作亭西山顔曰可友以書求詩為賦一首亨仲即北山忠愍公字君不見子猷嗜好與俗殊種竹不可一日無又不見太白清狂世絶倫舉杯邀月獨相親風流二子去巳逺塵埃那復聞髙人鄭侯未遇身更閒躬耕自樂巖谷間開亭容膝日寄傲坐對嶕嶢崒嵂之西山西山蒼翠如堆玉松奏笙竽雲作屋澄鮮爽氣日夕佳不學時情易翻覆田文唾面嗔小兒翟公署門良可嗤悠悠權利悲一時樂哉此友誰能知鄭侯與我論心久年少相從今白首對山勿著絶交書要須著我成三友夜坐聞竹聲示姪室明窗有燈夜暗天無月趺坐依蒲團竹聲助清絶初疑小雨至蕭蕭俄復歇忽然變軒昻風湍散巖穴聽久耳根靜萬慮皆瑩徹塵凡不待掃境妙心自潔竒哉不二門欲倩維摩說和季成弟中秋不見月時寓妙智山中經年等待中秋月一夕隂雲掃不開髙樹時驚疏雨過空山那復故人來夢回誰憶霓裳戲老去愁聞水調哀與子相逢長得醉何須佳節始銜杯朱教授見寄七言二首遂用其韻賢哉蘧瑗晚知非此道吾今亦庶幾囊乏一錢聊自哂家無三徑不妨歸冥鴻久已離矰繳野馬由來見靮鞿溪上月明船正穩肯將簪笏換蓑衣等閒長嘯倚孤松雲破天邉見碧峰架上殘書猶可讀瓶中儲粟不堪舂生涯幸有千年秀身世何須萬户封僧榻寄眠無一事覺來深省聽晨鐘僕讀沈約傳怒其緩頰賣國髮上衝冠然古今人每壯其東陽八篇文辭未有少之者因次卿登樓新什輒效立春體製和且攄所懷云隱侯文治知何用千古端羞墮淚碑國危忍助神鼎覆身免猶嗟革帶移登覽寒烟縈逺目凄凉夕照謝髙榱傷心往事君須賦恐有遒人來采詩夏日四絶四月天氣初鬱蒸碧桐照空門巷清何人解助隱居樂為我喚取黃鸝鳴掃地焚香避濕蒸睡餘茶熟碾聲清風來桐竹僛僛舞雨過階除㶁㶁鳴錯落星河天未明太虛涵露氣全清東方隱約生光耀便覺林間宿鳥驚姢姢䟱竹拂雲長門巷無塵氣自凉多病無情如嚼蠟卧看風篆博山香夜與仲嚴叔倚季成三弟同坐聞笛各賦一絶西北干戈撥不開今宵聞笛更清哀髙堂親老髮垂白與子買舟歸去來法清晚步分韻得夕字有生能幾何避亂不謀夕聯翩二三子晚步縱所適田野無人聲牛羊斷歸迹時看墟曲中寒烟裊修碧雍雍南飛雁北信杳難覔不知二聖君泫然淚沾臆小臣真蟣蝨持顛顧何力殘臘行當除青陽來已逼衰骸分填壑公輩冝強食贈方仁聲公吾里人客寓吳興神情散朗如晉宋間髙士晚得官無仕進意築庵西溪名曰雲茅以衛生養性為事詩文雄深雅健追古作者云學道悠悠未見功敢言凡質有仙風他年一鉢江湖去先向苕溪訪葛洪和沈秀才年來有客從黃石老去何心望紫泥世事違人常八九生涯隨力任東西軟語干時芻豢美苦言投俗桂薑辛山河若欲攄幽憤盥手焚香讀過秦弱齡慮事心常破壯嵗投閒鬢已華但得安貧如北阮何妨受侮似東家和三二兄西莊書懷莫問莊生然不然時中只可自隨緣冬深江北無邊報又得安貧過一年賢愚狂聖等為人要是天君自策勳舉世紛紛誰得妙韓公惟許孟軻醇古來達士盡窮空我愧修身道未豐痛飲不妨歌楚些投閒何幸伴吾儂一炷清香度博山妙觀不著有無間此心欲報難論價放我形骸十載閒和仲嚴弟暮春二絶吾生四十已侵尋獨喜年來不動心世事升沉君㑹否人間春去落花深沂上風光㸃獨知陶然寧復歎春移吾人老大知何用仰止前賢須及時梅花天與孤髙花獨新世間草木信非倫影涵水月不受彩氣傲氷霜何待春冷淡自能驅俗客風騷端合付幽人往來百匝階除裏頓使心無一㸃塵氣欲崢嶸嵗欲新寒梅方信冠羣倫直能平地凌封雪可是回根迎小春九畹蕙蘭真上客千山桃李盡庸人即今擕酒江郊去弄蕊攀條一拂塵雪中偶成飛花看六出俄向臘中來解驗人情喜始知天意回夜闌窗愈白晚凍日難開麥熟何時節飢民正可哀二歉嵗多流冗邦侯喜鄧來雪除驚臘盡耕近樂春回郊野猶同色江天已半開短衣難掩脛誰說少陵哀挽陳德固守禦強敵登城日中華將士奔人皆趨北闕君獨死南門祕計無人用英聲有史存秋原悲淚落桂酒與招魂詞滿庭芳中秋夾水松篁一天風露覺來身在扁舟桂花當午雲捲素光流起傍蓬窗危坐飄然竟欲到瀛州人世那知此夜空際列瓊樓休休閒最好十年歸夢兩眼鄉愁謾贏得蕭蕭華髮盈頭往事不須追諫從今去拂袖何求一樽餘酒持杯顧影起舞自相酬默成文集卷四
