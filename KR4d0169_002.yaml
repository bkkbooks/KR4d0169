body:
  text: 默成文集卷二宋潘良貴撰謝張丞相啓退即山林久濶寒暄之問仰瞻斗極徒頒次舍之光誠雖切于飛馳禮遂成於逋慢祗以為愧不能自文竊惟神物之護持宜有福祥之單厚輒申悃愊敢候茵慿恭惟某官望重百僚名聞九牧出處係朝廷之輕重道德為人倫之表儀光滉咸池夾輔中天之皎日威申華夏蕩除四塞之妖氛更險夷而節義愈明被謗傷而功庸益著逮膺申命起護價藩微雲之滓太清曽何傷於盛德大旱而作霖雨實有望於嘉猷諒無暖席之期即拜賜環之命顧惟無似深沐厚恩早蒙公緒之噓枯繼辱祁奚之舉類蘭臺適體屢興嘆於沈英紫槖持荷更叨榮於取頴中緣禍變分絶生存雞骨支牀僅留食息魚書染素莫效勤劬居然星紀之薦更藐爾珠廷之在望嵗聿云暮道阻且長井越參旗敻隔轅門之拜衮裳繡芾佇聞黃閣之開願益惠於生靈用亶符於睿眷傾依之切敷敘奚殫賀翟參政啓恭審光膺帝制參秉國鈞六星比而三台色齊識天心之所屬百僚喜而萬夫悅服慰人望之咸歸竊以自古治亂之分常係人材邪正之用泛觀百家諸子皆苦口而丁寧遐想九夷八蠻悉望風而進退非特時勢之必至抑亦人心之所同惟其正不勝於邪是以亂常多於治方今國家之患顧不在茲遂使幅􅊷靡寧莫知所向倘匪老成之出曷扶危殆之基荷上穹之未忘庶斯民之可救伏惟某官佐時人傑間世英賢瑞玉無瑕大寶儼陳於清廟霜筠有節孤風獨厲於嵗寒蜚聲騰譽於三朝歷險更夷而一致江湖雖適常懷觀闕之心鐘鼎既安何異山林之性方主上無多難之畏而左右惟正人之求用圖再造之功宜趨我公之入固將以大忠經世以至誠格天問國事萬變而不窮陳王業七月之所致掃骫骳懷姦之俗伸耿介有氣之風使乾坤無震蕩之憂生靈措休息之地詢之天下誰曰不然某性質凡愚學術固陋素乏趨承之幸遽蒙特達之知昔掌禮闈嘗與甄收之列逮承密旨復叨論薦之榮念此恩不忘於須臾雖多言莫致其萬一陽德純粹物候清和仰祈順時倍保鈞重瞻依頌禱不勝下情答雷公達諭以聚書飲酒為樂此吾人之習氣也然酒不可多飲大率此物入口則昏過量則亂聖人於書特作誥一篇易六十四卦終以濡首為戒禮使人飲酒終日而不得醉蓋禍患多生於此既作郡尤宜節慎也老而讀書不須務博當研味聖賢立言指歸以洗心勵行則老而益精明士人至晚年倒行而逆施之者十常八九正為不解讀書耳僕自喻為昏鏡喻書為磨鏡藥當用此藥擦磨塵垢使之通明透徹而後已若積藥鏡上而不施磨擦之功反為鏡之纍故知托儒為姦如張禹孔光之徒曽不若庸夫愚婦也公以為何如萬里通書不敢效常人作諛言以孤逺意此狂友故態也幸一笑納之啓李太發即莊簡公李光也言念粵從初仕雖為道義之交逮此晚年未托葭莩之好靜惟寒族敢議通婚既蒙金石之嘉言用致筐箱之菲幣伏承令女小娘子資涵粹美秀夙著於閨房某姪畤質本戅愚學初聞於詩禮式因媒妁願結絲蘿將親迎於大門庶承祧於宗祀其為愧佩罔罄敷陳答田氏禮書田經國公之姊丈而武公之甥也伏承髙明之從弟武乃吾姊之子而某之甥也吾姊為田氏婦三十年矣老而益貧某欲以長女妻武俾之左右奉承焉此素志也茲承申之以媒妁致之以雁幣敢不拜嘉默成文集卷二
