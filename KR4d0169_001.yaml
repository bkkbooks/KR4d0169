body:
  text: 默成文集卷一宋潘良貴撰論治體劄子臣嘗謂自古一治一亂不可為常由堯舜迄於五代三千二百九十餘年其間所以治者無他君臣協心共相戒飭凡所施為合於大公至正之道而已所以亂者無他君臣異志皆務因循凡所施為悖於大公至正之道而已仰惟祖宗之有天下兵不血創市不易肆天意人心不約而歸當時制為法度立為紀綱非益於國非利於民有所弗措是以海內廓然無事百有餘年承平日久奸邪擅權肆為欺蔽率意改作祖宗紀綱法度廢壞殆盡遂繼之以大亂陛下紹承大業於艱難之際焦心勞思欲恢復中原迎還二聖九年於茲矣然而治道殊未有以稱聖意者臣謂大公至正之道尚塞而未行也夫祖宗順此道而治其後逆此道而亂今不欲治安如祖宗時則已如必欲之可不兢兢業業朝夕惟此道之是念乎臣願陛下靜澄其心思祖宗創業之難念父兄逺狩之久憫生靈常懷塗炭之苦憤土地日有侵削之憂凡下一令行一事必先以此四者為念然後發之于政詔大臣同心協力勿以一毫私意曲徇人情斷自今日其已往者漸以公正之道更革之其方來者力以公正之道固守之如四時之有信如金石之不移則天下庶有休息之期也如其不然臣恐大事寖以大壞雖無敵人之患而中國自敝矣陛下留神察焉取進止謝嚴州到任表忱辭上達極陳愛日之情睿澤下流恭被自天之命愧增汗浹感極涕零中謝伏念臣蚤奮單貧誤䝉識擢有親已老去鄉實難屬奉詔音肅馳行闕載因陟岵復念趨庭仰軫皇慈俯施洪造仍寓名於龍閣俾增重於虎符奉檄惟慚啓途已至西瞻佳氣喜帝所以非遙東指白雲迎親闈而甚邇拊循有暇定省惟勤每於學禮之餘得奉教忠之訓克諧烏哺敢替葵傾此蓋伏遇皇帝陛下盛德日躋至仁天覆操賞罰之魁柄駕馭百工恢道德之宏綱包羅一介曲從人欲仰見天心臣謹當惕惕以思孜孜自厲既遑將父欣逢孝治之朝何以事君願效古人之節謝嚴州送還兵級不合借請降官表事違令甲罪見劾章仰荷湛恩曲行輕典中謝伏念臣涉道迂淺從政拙疏日者叨亳社之祠宮解桐廬之印綬扶攜老稚資藉車徒雖無千里而不必聚糧顧餘百人而安所仰食束裝欲發援例來言一時猥狥於人情三尺謬干於吏議重惟鹵莽退積兢慚敢意懲愆止從褫秩茲蓋伏遇皇帝陛下總該庶政駕馭羣工好惡未常有私賞罰必惟其當臣敢不恪遵明訓深省往尤所愧身閒更切無名之粟倘紓國難願捐不資之軀謝中書舍人告表塵禁省以代言巳慚非據即里居而拜命更冒殊恩憂患餘生周章失措中謝伏念臣立身寒苦賦性戅愚先帝擢臣於布衣今踰二紀陛下置臣於諫省亦復終星每思自效於涓埃庶或少裨於海嶽其如命繆動與願違日者召自真祠置諸册府旋載螭廷之筆亟聯鳯閣之班始奉除書遽聞親疾方寸已亂即日遂行惟茲專輒之私宜在譴呵之域敢圖孤迹上軫皇慈憐臣去國之蒼黃則錫命以為問寢之慰恤臣遭難之窮乏則賜金俾襄大事之勤存沒知歸哀榮有耀雖碎螻蟻之命曷酬天地之恩及此外除恍如昔夢拜九天之綸綍命實維新被三品之服章德非其稱恭惟皇帝陛下加惠羣工厲精庶政湛恩遐暨顧雖小物而曲成孚號誕揚不以陳人而中廢臣敢不激昻殘喘策厲懦衷蚤夜以思克謹教忠之訓險夷不二永堅狥國之誠凡可捐軀誓當竭節謝中書舍人表待盡倚廬方畢三年之制召還西掖載膺一札之除寵至魂驚感深涕隕中謝竊以政事之地必資論思獻納之才詔令之行當得深厚坦明之訓唯奧學該通於今古英詞追配於典謨識慮知為治之後先直諌宏事君之規益斯可以仰助雷風之號誕揚綸綍之言如臣者憂患陳人荒蕪下士禀資方拙更三黜而自憐賦分竒窮巳半生而寡與頃叨螭筆旋陟麟臺始被寵光遽罹凶禍抱苦願終於苫塊無心復造於衣冠日月遷流形容凋悴撫祥琴而增慕傳召節之巳頒果奉除書復還舊物里閭改觀共瞻天眷之優隆頂踵知愧獨荷聖心之簡記顧雖碎首曷報鴻恩茲蓋伏遇皇帝陛下乃武乃文克勤克儉思道如商髙之恭默接下過周宣之慎微事舉法於春秋化每形於雅頌廣收俊彥欲致中興施及妄庸亦叨睿奬臣敢不孜孜奉國亹亹禔身溫故知新願日深於德意獻可替否庶或補於艱難誓竭孤忠以期沒齒謝集英殿修撰提舉江州太平觀表承之掖垣蔑著盡規之義丐閒祠館曲䝉從欲之仁祗服恩私益深漸懼中謝伏念臣入仕二紀獲事三朝唯知忠義而披露肝心敢念飢寒而保持祿位自信甚篤人言莫因歷落􅋂﨑衆皆指為可笑流離困苦臣獨奮而不衰屬憤奸邪實非職守歷階陛殿怒髮衝冠雖非能衛社稷而執干戈亦庶幾如鷹鸇之逐鳥雀退思冒昧甘俟誅夷始陳待罪之章亟䝉涵貸旋上奉祠之請即獲便安仍加論撰之名俾全進退之節君父之慈憐若此臣子之報稱若何恭惟皇帝陛下駕馭羣雄綜核名實陟降無私而帝則是順好惡罔作而王道攸遵如臣狂愚不忍竄斥然方軍食匱難之日而坐靡廪廥國事搶攘之際而燕處山林俯仰以思面目有愧臣敢不恪勤香火懲艾過愆疾病交侵雖作終焉之計形骸未隕益堅國爾之心庶畢餘生以酬洪造辭免祕書少監申省狀准尚書省劄子八月十二日三省同奉聖㫖潘良貴除祕書少監不候授告指揮到於所居州軍依條差撥疾速前來行在所供職臣良貴昨於建炎元年內任工部員外郎為父年老抱病陳乞宫觀建炎四年內䝉恩除荆湖南路提㸃刑獄公事亦是不曽赴任紹興二年任左司員外郎僅二月乞便鄉差遣䝉差知嚴州到任四箇月即令宫祠八年之間纍䝉除用皆以親老懇求便私今父八十九嵗比之往日衰病益侵人子之情尤難逺去伏乞特賜敷奏改除一宫觀差遣伏候指揮辭免起居郎狀准尚書省劄子三省同奉聖㫖除臣起居郎日下供職聞命震驚罔知所措伏念臣頻年以來四更宫觀實緣親老非敢偷安茲被誤恩召置册府充職踰月獲覲清光輒罄丹誠仰干天聽丐還真館復遂初心退而省循方候呵譴忽䝉升擢局蹐靡寧况左史之職君動則書班於從官其選素慎不惟臣愚非所宜據而請閒得要求退獲遷言行相違尤難安處伏望聖慈特降睿㫖追寢成命除臣一在外宫觀以安愚分謹録奏聞伏候敕㫖乞宫觀狀臣近因權攝左史彈奏戶部向子諲繼上章待罪雖䝉聖恩寬貸然臣恐懼終不自安伏念臣禀性愚戅賦分窮薄臨事妄發屢陷危機若久居侍從之間必速致顛排之悔兼臣近更憂患心志凋摧獻納論思自知無補伏望聖慈曲加覆護除臣一在外宫觀差遣以養殘骸倘未致於死亡誓當圖於報效伏候敕㫖默成文集卷一
