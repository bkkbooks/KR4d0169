body:
  text: 默成文集别集類三宋提要臣等謹案默成文集八卷宋潘良貴撰良貴字義榮一字子賤號默成居士婺州金華人政和五年以廷試第二人釋褐為辟雍博士纍遷提舉淮南東路常平靖康元年召還坐事除監信州汭口排岸髙宗即位召為左司諌厯除徽猷閣待制提舉亳州明道宫坐與李光通書降三官卒贈左朝奉大夫事蹟具宋史本傳良貴學術醇正侃直不阿首論何㮚等之不可為相又與黃潛善吕頤浩相忤又面劾向子諲屢坐屏斥而所守不移故朱子亦稱其剛毅近仁其論治體箚子等篇悱惻沈痛足以感人又足以覘其節概其集見於史者十五卷久佚不傳此本乃康熙中其裔孫所刋僅文二十首詩二十七首詞一首皆掇拾於散亡之餘粗存梗概然以集中除謝諸表與本傳年譜相較亦多足資參訂如年譜載良貴既至嚴州任請祠得主管亳州明道宫轉祕書少監遷起居郎拜中書舍人今集中有辭免祕書少監申省狀可與年譜相證而本傳不云轉祕書少監又良貴知嚴州之後凡再為中書舍人集中有謝中書舍人誥表又有謝中書舍人表可證而本傳但云起為中書舍人不著前後再命皆可以補宋史之闕誤惟是篇頁寥寥而强分卷帙未免有意求多又一卷二卷皆載本傳及年譜誥敕等文至三卷乃及其著作雖用宋敏求編李白集之例而喧奪太甚究為編次無法至潘畤乃良佐之子於良貴為猶子而亦附其傳志於末編尤為不倫今姑仍舊本録之而附糾其叢脞如右乾隆四十三年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀默成文集原序天地之化包括無外運行無窮然其所以為實不越乎一隂一陽兩端而巳其動靜屈伸往來闔闢升降浮沉之性雖未嘗一日不相反然亦不可一日而相無也聖人作易以通神明之德類萬物之情其所以為說者亦若是焉耳矣然及其推之人事而擬諸形容則常以陽為君子而引翼扶持惟恐其不盛隂為小人而排擯黜抑惟恐其不衰何哉蓋陽之德剛隂之德柔剛者常公而柔者常私剛者常明而柔者常暗剛者未嘗不正而柔者未嘗不邪剛者未嘗不大而柔者未嘗不小公明正大之人用於世則天下䝉其福私暗邪辟之人得其志則天下受其禍此理之必然也且非獨於易之說為然蓋凡自古聖賢之言雜出於傳記者亦未有不好剛而惡柔者若夫子所謂剛毅近仁而又嘗深以未見剛者為嘆及乎或人之對則又直以有欲病棖也之不得為剛蓋専以是為君子之德也嗚呼若故中書舍人金華潘公者其真夫子所謂未見者哉熹雖不幸而不及灑掃其門然讀其書而猶喜於有以得其所存之倣佛也蓋公自宣和初為博士則已不肯託婚富貴之家而獨嘗論斥大臣䝉蔽之奸矣及為館職又不肯遊蔡京父子間使淮南又不肯與中官同燕席靖康召對因論時宰何㮚唐恪不可用恐誤國事以是謫去曽不旋踵而言果驗建炎初召為右司諌首論亂臣逆黨當用重典以正邦法壯國威且及當時用事奸邪之狀大為汪黃所忌書奏三日而左遷以去其言雖不大傳然劉觀所草謫詞直以揣摩詆訾為罪則其事固可知已紹興入為都司又忤時相以歸復為左史一日直前奏曰先王之所以致治者以其合於大公至正之道此年之所以致亂者以其反此而已陛下今日誠冝仰思祖宗創業之難二帝䝉塵之久俯念生靈塗炭之苦土地侵削之多夙寤晨興不敢少置每行一事必先念此然後發之務以合於所謂大公至正之道勿以一毫私意曲狥人情則天下庶有休息之期矣服喪還朝又以廷叱奏事官而忤㫖以去自是之後秦檜擅朝則公遂廢於家而不復起矣然公平生亷介自將自少至老出入三朝而前後在官不過八百六十餘日所居僅庇風雨郭外無尺寸之田經界法行獨以丘墓之寄輸帛數尺而已其清苦貧約蓋有人所不能堪者而處之超然然未嘗少屈於檜其子熺暴起鼎貴勢傾中外亦未嘗與通問也嘗誦君子三戒之言深以在得之規痛自警飭至於造次之間一言一行凡所以接朋友教子弟亦未嘗不以孝弟忠敬節儉正直防微謹獨之意為本其讀書磨鏡之喻切中學者之病當世蓋多傳之而所論汲長孺蓋寬饒之為人尤足以見其志之所存已嗚呼若公之清明直諒確然無欲其真可謂剛毅而近仁矣夫以三代之時聖人之世而夫子已嘆剛者之不可見况於百世之下幸有如公者焉而不得少伸其志以沒其條奏章藁有補於時可為後法者又以公自焚削而不復存平生之言頗可見者獨有賦詠筆札之餘數十百篇而已後之君子蓋將由此以論公之世其可使之沒沒無傳而遂已乎公之兄子今廣州使君畤謂熹盍序其書而傳之熹不敢當而亦不得辭也於是三復其書而掇其梗槩附於書首以告觀者且時出而伏讀之以自勵焉公諱良貴字義榮一字子賤自號默成居士集凡十有五卷廣州字德鄜少學於公植志行巳甚有家法數為郡守部使者愛民戢奸不憚大吏所至皆有風績云淳熙丙午春三月已卯朔旦具位新安朱熹謹序
